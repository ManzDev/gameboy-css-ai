<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Game Boy Web Component</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <script type="module">
    import { LitElement, html, css } from 'https://unpkg.com/lit@3/index.js?module';
    import { styleMap } from 'https://unpkg.com/lit@3/directives/style-map.js?module';

    const { Howl, Howler } = window;

    const SHELL_FILTERS = {
      classic: 'none',
      lime: 'hue-rotate(55deg) saturate(1.2)',
      violet: 'hue-rotate(285deg) saturate(1.15)',
      ice: 'hue-rotate(185deg) saturate(0.9)'
    };

    const DEFAULT_SETTINGS = {
      glow: 1,
      contrast: 1.08,
      noise: 0.12,
      tilt: -1.5,
      shell: 'classic'
    };

    function clamp(v, min, max) {
      return Math.min(max, Math.max(min, v));
    }

    function hashNoise(n) {
      const x = Math.sin(n * 12.9898) * 43758.5453;
      return (x - Math.floor(x)) * 2 - 1;
    }

    function encodeWav(samples, sampleRate = 22050) {
      const numChannels = 1;
      const bitsPerSample = 16;
      const blockAlign = (numChannels * bitsPerSample) / 8;
      const byteRate = sampleRate * blockAlign;
      const dataSize = samples.length * blockAlign;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);
      let offset = 0;

      function writeString(str) {
        for (let i = 0; i < str.length; i++) {
          view.setUint8(offset++, str.charCodeAt(i));
        }
      }

      writeString('RIFF');
      view.setUint32(offset, 36 + dataSize, true); offset += 4;
      writeString('WAVE');
      writeString('fmt ');
      view.setUint32(offset, 16, true); offset += 4;
      view.setUint16(offset, 1, true); offset += 2;
      view.setUint16(offset, numChannels, true); offset += 2;
      view.setUint32(offset, sampleRate, true); offset += 4;
      view.setUint32(offset, byteRate, true); offset += 4;
      view.setUint16(offset, blockAlign, true); offset += 2;
      view.setUint16(offset, bitsPerSample, true); offset += 2;
      writeString('data');
      view.setUint32(offset, dataSize, true); offset += 4;

      for (let i = 0; i < samples.length; i++) {
        const s = clamp(samples[i], -1, 1);
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
        offset += 2;
      }

      const bytes = new Uint8Array(buffer);
      let binary = '';
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
      }
      return `data:audio/wav;base64,${btoa(binary)}`;
    }

    function makeThemeWave() {
      const sampleRate = 22050;
      const seconds = 8;
      const total = sampleRate * seconds;
      const out = new Float32Array(total);

      // Original retro loop: chiptune-ish, but not a copy of any commercial theme.
      const melody = [659.25, 783.99, 740.00, 659.25, 587.33, 659.25, 523.25, 587.33];
      const bass = [164.81, 164.81, 196.00, 196.00, 146.83, 146.83, 174.61, 174.61];
      const stepDur = 0.25;

      const square = (f, t, duty = 0.5) => {
        const phase = (t * f) % 1;
        return phase < duty ? 1 : -1;
      };

      const triangle = (f, t) => {
        const phase = (t * f) % 1;
        return 4 * Math.abs(phase - 0.5) - 1;
      };

      for (let i = 0; i < total; i++) {
        const t = i / sampleRate;
        const step = Math.floor(t / stepDur) % melody.length;
        const local = t % stepDur;
        const leadEnv = Math.exp(-local * 10.5) * 0.42;
        const bassEnv = Math.exp(-local * 4.8) * 0.28;
        const hatEnv = Math.exp(-local * 22) * 0.06;

        const lead = square(melody[step], t, 0.28) * leadEnv;
        const arp = square(melody[(step + 2) % melody.length] * 2, t, 0.18) * leadEnv * 0.28;
        const low = triangle(bass[step], t) * bassEnv * 0.9;
        const kick = Math.exp(-((local * 8) ** 2)) * 0.12 * Math.sin(2 * Math.PI * 58 * t);
        const hat = hashNoise(i) * hatEnv;

        out[i] = clamp(lead + arp + low + kick + hat, -1, 1);
      }

      return encodeWav(out, sampleRate);
    }

    function makeClickWave() {
      const sampleRate = 22050;
      const seconds = 0.08;
      const total = sampleRate * seconds;
      const out = new Float32Array(total);

      for (let i = 0; i < total; i++) {
        const t = i / sampleRate;
        const env = Math.exp(-t * 70);
        const tone = Math.sin(2 * Math.PI * (360 + t * 950) * t) * 0.7;
        const noise = hashNoise(i * 7.3) * 0.25;
        out[i] = clamp((tone + noise) * env, -1, 1);
      }

      return encodeWav(out, sampleRate);
    }

    class VisualPanel extends LitElement {
      static properties = {
        settings: { type: Object },
      };

      static styles = css`

          display: block;
        }

        .panel {
          width: 100%;
          max-width: 300px;
          background: linear-gradient(180deg, rgba(24, 24, 28, 0.92), rgba(14, 14, 18, 0.96));
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 22px;
          box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
          padding: 18px;
          color: #ececec;
          backdrop-filter: blur(10px);
        }

        h2 {
          margin: 0 0 8px;
          font-size: 1.05rem;
          letter-spacing: 0.06em;
          text-transform: uppercase;
        }

        p {
          margin: 0 0 16px;
          font-size: 0.88rem;
          line-height: 1.45;
          color: rgba(236, 236, 236, 0.72);
        }

        .grid {
          display: grid;
          gap: 14px;
        }

        label {
          display: grid;
          gap: 8px;
          font-size: 0.84rem;
          color: rgba(236, 236, 236, 0.82);
        }

        .row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
        }

        .value {
          font-variant-numeric: tabular-nums;
          color: rgba(255, 255, 255, 0.88);
          min-width: 48px;
          text-align: right;
        }

        input[type='range'] {
          width: 100%;
          accent-color: #d9d9d9;
        }

        select {
          width: 100%;
          border-radius: 14px;
          border: 1px solid rgba(255, 255, 255, 0.12);
          background: rgba(255, 255, 255, 0.06);
          color: inherit;
          padding: 10px 12px;
          outline: none;
        }

        .hint {
          margin-top: 14px;
          font-size: 0.78rem;
          color: rgba(236, 236, 236, 0.58);
        }
      `;

      constructor() {
        super();
        this.settings = DEFAULT_SETTINGS;
      }

      emitChange(partial) {
        this.dispatchEvent(new CustomEvent('settings-change', {
          detail: partial,
          bubbles: true,
          composed: true
        }));
      }

      render() {
        const s = this.settings;
        return html`
          <section class="panel">
            <h2>Visual controls</h2>
            <p>Minor tweaks for the shell and the screen. Humans do love sliders that pretend to matter.</p>

            <div class="grid">
              <label>
                <div class="row"><span>Screen glow</span><span class="value">${s.glow.toFixed(2)}x</span></div>
                <input type="range" min="0.7" max="1.5" step="0.01" .value=${String(s.glow)} @input=${(e) => this.emitChange({ glow: Number(e.target.value) })} />
              </label>

              <label>
                <div class="row"><span>Contrast</span><span class="value">${s.contrast.toFixed(2)}x</span></div>
                <input type="range" min="0.9" max="1.35" step="0.01" .value=${String(s.contrast)} @input=${(e) => this.emitChange({ contrast: Number(e.target.value) })} />
              </label>

              <label>
                <div class="row"><span>Screen noise</span><span class="value">${Math.round(s.noise * 100)}%</span></div>
                <input type="range" min="0" max="0.28" step="0.01" .value=${String(s.noise)} @input=${(e) => this.emitChange({ noise: Number(e.target.value) })} />
              </label>

              <label>
                <div class="row"><span>Shell tilt</span><span class="value">${s.tilt.toFixed(1)}°</span></div>
                <input type="range" min="-6" max="6" step="0.1" .value=${String(s.tilt)} @input=${(e) => this.emitChange({ tilt: Number(e.target.value) })} />
              </label>

              <label>
                <div class="row"><span>Shell tint</span><span class="value">${s.shell}</span></div>
                <select .value=${s.shell} @change=${(e) => this.emitChange({ shell: e.target.value })}>
                  <option value="classic">classic</option>
                  <option value="lime">lime</option>
                  <option value="violet">violet</option>
                  <option value="ice">ice</option>
                </select>
              </label>
            </div>

            <div class="hint">Audio tries to start on load. If the browser blocks it, tap the machine once. Very advanced technology.</div>
          </section>
        `;
      }
    }

    customElements.define('visual-panel', VisualPanel);

      constructor() {
        super();
        this.settings = DEFAULT_SETTINGS;
        this.pressed = '';
        this.audioState = 'booting';
        this.theme = null;
        this.click = null;
        this._unlockOnce = null;
      }

      firstUpdated() {
        this.initAudio();
        this._unlockOnce = () => this.tryPlayTheme();
        window.addEventListener('pointerdown', this._unlockOnce, { once: true });
        window.addEventListener('keydown', this._unlockOnce, { once: true });
      }

      disconnectedCallback() {
        super.disconnectedCallback();
        if (this._unlockOnce) {
          window.removeEventListener('pointerdown', this._unlockOnce);
          window.removeEventListener('keydown', this._unlockOnce);
        }
      }

      updated(changedProps) {
        if (changedProps.has('settings')) {
          const s = this.settings;
          this.style.setProperty('--shell-filter', SHELL_FILTERS[s.shell] || 'none');
          this.style.setProperty('--screen-brightness', String(s.glow));
          this.style.setProperty('--screen-contrast', String(s.contrast));
          this.style.setProperty('--screen-noise', String(s.noise));
          this.style.setProperty('--screen-tilt', `${s.tilt}deg`);
        }
      }

      initAudio() {
        const themeUrl = makeThemeWave();
        const clickUrl = makeClickWave();

        this.theme = new Howl({
          src: [themeUrl],
          loop: true,
          volume: 0.58,
          preload: true,
          html5: false,
          onload: () => {
            this.audioState = 'loaded';
            this.tryPlayTheme();
          },
          onplayerror: () => {
            this.audioState = 'blocked';
          },
          onloaderror: () => {
            this.audioState = 'error';
          }
        });

        this.click = new Howl({
          src: [clickUrl],
          volume: 0.45,
          preload: true,
          html5: false
        });
      }

      tryPlayTheme() {
        if (!this.theme) return;
        try {
          if (!this.theme.playing()) {
            this.theme.play();
            this.audioState = 'playing';
          }
        } catch {
          this.audioState = 'blocked';
        }
      }

      press(key) {
        this.pressed = key;
        this.click?.stop();
        this.click?.play();
        setTimeout(() => {
          if (this.pressed === key) this.pressed = '';
        }, 120);
      }

      onKeyDown(e) {
        const map = {
          ArrowUp: 'up',
          ArrowDown: 'down',
          ArrowLeft: 'left',
          ArrowRight: 'right',
          z: 'b',
          x: 'a',
          Enter: 'start',
          Shift: 'select'
        };
        const key = map[e.key] || map[e.key?.toLowerCase?.()];
        if (key) {
          e.preventDefault();
          this.press(key);
        }
      }

      render() {
        const shellStyle = styleMap({
          '--screen-brightness': this.settings.glow,
          '--screen-contrast': this.settings.contrast,
          '--screen-noise': this.settings.noise,
          '--screen-tilt': `${this.settings.tilt}deg`,
          '--shell-filter': SHELL_FILTERS[this.settings.shell] || 'none'
        });

        const audioText = {
          booting: 'audio: booting',
          loaded: 'audio: ready',
          playing: 'audio: playing',
          blocked: 'audio: tap to unlock',
          error: 'audio: failed'
        }[this.audioState] || 'audio: booting';

        return html`
          <div class="machine" style=${shellStyle} @pointerdown=${() => this.tryPlayTheme()}>
            <div class="brand">Nintendo</div>
            <div class="power-led" title="Power on"></div>
            <div class="audio-note">${audioText}</div>

            <div class="screen-wrap">
              <div class="screen" role="img" aria-label="Original retro action scene inspired by the Game Boy era">
                <div class="scene"></div>
                <div class="city"></div>
                <div class="tank"></div>
                <div class="road"></div>
                <div class="light"></div>
                <div class="noise"></div>
                <div class="scanlines"></div>
                <div class="glare"></div>
                <div class="status">ORBITAL CHASE // GRID 07</div>
              </div>
            </div>

            <div class="controls-left">
              <div class="dpad" aria-label="Direction pad">
                <div class="cross"></div>
                <button class="up ${this.pressed === 'up' ? 'pressed' : ''}" aria-label="Up" @pointerdown=${() => this.press('up')}>up</button>
                <button class="down ${this.pressed === 'down' ? 'pressed' : ''}" aria-label="Down" @pointerdown=${() => this.press('down')}>down</button>
                <button class="left ${this.pressed === 'left' ? 'pressed' : ''}" aria-label="Left" @pointerdown=${() => this.press('left')}>left</button>
                <button class="right ${this.pressed === 'right' ? 'pressed' : ''}" aria-label="Right" @pointerdown=${() => this.press('right')}>right</button>
              </div>
            </div>

            <div class="controls-right">
              <div class="action" aria-label="Action buttons">
                <button class="b ${this.pressed === 'b' ? 'pressed' : ''}" aria-label="B button" @pointerdown=${() => this.press('b')}>B</button>
                <button class="a ${this.pressed === 'a' ? 'pressed' : ''}" aria-label="A button" @pointerdown=${() => this.press('a')}>A</button>
                <div class="labels"><span>B</span><span>A</span></div>
              </div>
            </div>

            <div class="system">
              <button class="${this.pressed === 'select' ? 'pressed' : ''}" aria-label="Select" @pointerdown=${() => this.press('select')}>Select</button>
              <div class="bar"></div>
              <button class="${this.pressed === 'start' ? 'pressed' : ''}" aria-label="Start" @pointerdown=${() => this.press('start')}>Start</button>
            </div>

            <div class="speaker" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
        `;
      }
    }

    customElements.define('gameboy-machine', GameBoyMachine);

    class AppRoot extends LitElement {
      static properties = {
        settings: { type: Object }
      };

      static styles = css`
        :host {
          display: block;
          min-height: 100vh;
          color: #f2f2f2;
          background:
            radial-gradient(circle at top, rgba(114, 114, 124, 0.32), transparent 35%),
            linear-gradient(180deg, #111115 0%, #0a0a0d 100%);
        }

        .layout {
          min-height: 100vh;
          display: grid;
          grid-template-columns: minmax(320px, 1fr) minmax(260px, 320px);
          gap: 28px;
          align-items: center;
          justify-content: center;
          padding: 28px;
        }

        .machine-shell {
          display: flex;
          justify-content: center;
          align-items: center;
        }

        @media (max-width: 940px) {
          .layout {
            grid-template-columns: 1fr;
            justify-items: center;
          }
        }
      `;

      constructor() {
        super();
        this.settings = DEFAULT_SETTINGS;
      }

      onSettingsChange(e) {
        this.settings = { ...this.settings, ...e.detail };
      }

      render() {
        return html`
          <div class="layout">
            <div class="machine-shell">
              <gameboy-machine .settings=${this.settings}></gameboy-machine>
            </div>
            <visual-panel .settings=${this.settings} @settings-change=${(e) => this.onSettingsChange(e)}></visual-panel>
          </div>
        `;
      }
    }

    customElements.define('app-root', AppRoot);
  </script>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      overflow-x: hidden;
    }
  </style>
</head>

<body>
  <app-root></app-root>
</body>

</html>
