<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameBoy Term2 Player</title>
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js"></script>
  <script type="module">
    import { LitElement, html, css } from 'https://cdn.jsdelivr.net/npm/lit@2.6.1/index.js';

    class GameBoyControls extends LitElement {
      static properties = {
        contrast: { type: Number },
        tint: { type: String },
        brightness: { type: Number },
        volume: { type: Number },
        musicEnabled: { type: Boolean }
      };

      static styles = css`
        :host {
          display: block;
          font-family: 'Courier New', monospace;
        }

        .widget {
          background: linear-gradient(145deg, #1a1a2e, #16213e);
          border: 2px solid #0f3460;
          border-radius: 12px;
          padding: 20px;
          color: #e94560;
          box-shadow:
            0 0 20px rgba(233, 69, 96, 0.3),
            inset 0 0 20px rgba(0, 0, 0, 0.5);
          min-width: 260px;
        }

        .widget-title {
          font-size: 14px;
          font-weight: bold;
          text-transform: uppercase;
          letter-spacing: 3px;
          margin-bottom: 20px;
          text-align: center;
          color: #fff;
          text-shadow: 0 0 10px #e94560;
          border-bottom: 1px solid #0f3460;
          padding-bottom: 10px;
        }

        .control-group {
          margin-bottom: 18px;
        }

        .control-label {
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-size: 11px;
          text-transform: uppercase;
          letter-spacing: 1px;
          margin-bottom: 8px;
          color: #a0a0a0;
        }

        .control-value {
          color: #e94560;
          font-weight: bold;
          min-width: 40px;
          text-align: right;
        }

        input[type="range"] {
          width: 100%;
          height: 6px;
          -webkit-appearance: none;
          appearance: none;
          background: linear-gradient(90deg, #0f3460, #16213e);
          border-radius: 3px;
          outline: none;
          cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
          -webkit-appearance: none;
          appearance: none;
          width: 16px;
          height: 16px;
          background: #e94560;
          border-radius: 50%;
          cursor: pointer;
          box-shadow: 0 0 10px #e94560;
          transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
          transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
          width: 16px;
          height: 16px;
          background: #e94560;
          border-radius: 50%;
          cursor: pointer;
          border: none;
          box-shadow: 0 0 10px #e94560;
        }

        select {
          width: 100%;
          padding: 8px 12px;
          background: #0f3460;
          border: 1px solid #16213e;
          border-radius: 6px;
          color: #e94560;
          font-family: inherit;
          font-size: 12px;
          cursor: pointer;
          outline: none;
          transition: border-color 0.3s;
        }

        select:hover, select:focus {
          border-color: #e94560;
        }

        .toggle-container {
          display: flex;
          align-items: center;
          justify-content: space-between;
        }

        .toggle-switch {
          position: relative;
          width: 50px;
          height: 24px;
        }

        .toggle-switch input {
          opacity: 0;
          width: 0;
          height: 0;
        }

        .toggle-slider {
          position: absolute;
          cursor: pointer;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: #0f3460;
          border-radius: 24px;
          transition: 0.3s;
        }

        .toggle-slider:before {
          position: absolute;
          content: "";
          height: 18px;
          width: 18px;
          left: 3px;
          bottom: 3px;
          background: #a0a0a0;
          border-radius: 50%;
          transition: 0.3s;
        }

        input:checked + .toggle-slider {
          background: #e94560;
          box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        input:checked + .toggle-slider:before {
          transform: translateX(26px);
          background: #fff;
        }

        .divider {
          height: 1px;
          background: linear-gradient(90deg, transparent, #0f3460, transparent);
          margin: 15px 0;
        }
      `;

      constructor() {
        super();
        this.contrast = 80;
        this.tint = 'green';
        this.brightness = 100;
        this.volume = 70;
        this.musicEnabled = true;
      }

      _emitChange(prop, value) {
        this.dispatchEvent(new CustomEvent('setting-change', {
          detail: { property: prop, value: value },
          bubbles: true,
          composed: true
        }));
      }

      _onContrastChange(e) {
        this.contrast = parseInt(e.target.value);
        this._emitChange('contrast', this.contrast);
      }

      _onTintChange(e) {
        this.tint = e.target.value;
        this._emitChange('tint', this.tint);
      }

      _onBrightnessChange(e) {
        this.brightness = parseInt(e.target.value);
        this._emitChange('brightness', this.brightness);
      }

      _onVolumeChange(e) {
        this.volume = parseInt(e.target.value);
        this._emitChange('volume', this.volume);
      }

      _onMusicToggle(e) {
        this.musicEnabled = e.target.checked;
        this._emitChange('music', this.musicEnabled);
      }

      render() {
        return html`
          <div class="widget">
            <div class="widget-title">Display Controls</div>

            <div class="control-group">
              <div class="control-label">
                <span>Screen Contrast</span>
                <span class="control-value">${this.contrast}%</span>
              </div>
              <input type="range" min="0" max="100"
                     .value="${this.contrast}"
                     @input="${this._onContrastChange}">
            </div>

            <div class="control-group">
              <div class="control-label">
                <span>Screen Tint</span>
              </div>
              <select @change="${this._onTintChange}">
                <option value="green" ?selected="${this.tint === 'green'}">Classic Green</option>
                <option value="grey" ?selected="${this.tint === 'grey'}">Monochrome Grey</option>
                <option value="amber" ?selected="${this.tint === 'amber'}">Amber LCD</option>
                <option value="blue" ?selected="${this.tint === 'blue'}">Cool Blue</option>
              </select>
            </div>

            <div class="control-group">
              <div class="control-label">
                <span>Brightness</span>
                <span class="control-value">${this.brightness}%</span>
              </div>
              <input type="range" min="50" max="150"
                     .value="${this.brightness}"
                     @input="${this._onBrightnessChange}">
            </div>

            <div class="divider"></div>

            <div class="control-group">
              <div class="control-label">
                <span>Sound Volume</span>
                <span class="control-value">${this.volume}%</span>
              </div>
              <input type="range" min="0" max="100"
                     .value="${this.volume}"
                     @input="${this._onVolumeChange}">
            </div>

            <div class="control-group">
              <div class="control-label">
                <span>Theme Music</span>
              </div>
              <div class="toggle-container">
                <span style="color: #a0a0a0; font-size: 10px;">OFF</span>
                <label class="toggle-switch">
                  <input type="checkbox"
                         ?checked="${this.musicEnabled}"
                         @change="${this._onMusicToggle}">
                  <span class="toggle-slider"></span>
                </label>
                <span style="color: #a0a0a0; font-size: 10px;">ON</span>
              </div>
            </div>
          </div>
        `;
      }
    }

    customElements.define('gameboy-controls', GameBoyControls);
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gb-grey-light: #9B9B9B;
      --gb-grey: #8B8B8B;
      --gb-grey-dark: #6B6B6B;
      --gb-grey-darker: #4A4A4A;
      --gb-black: #2C2C2C;
      --gb-button-maroon: #6B1E3D;
      --gb-button-maroon-dark: #4A1530;
      --gb-screen-green: #0F380F;
      --gb-pixel-light: #8BAC0F;
      --gb-pixel-dark: #306230;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 8px;
      text-shadow:
        0 0 10px rgba(233, 69, 96, 0.8),
        0 0 20px rgba(233, 69, 96, 0.5),
        0 0 40px rgba(233, 69, 96, 0.3);
      margin-bottom: 8px;
    }

    .subtitle {
      color: #a0a0a0;
      font-size: 0.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .main-container {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 1200px;
      width: 100%;
    }

    .gameboy {
      --screen-contrast: 80;
      --screen-tint: green;
      --screen-brightness: 100;

      position: relative;
      width: 320px;
      height: 540px;
      background: linear-gradient(180deg, var(--gb-grey-light) 0%, var(--gb-grey) 10%, var(--gb-grey) 90%, var(--gb-grey-dark) 100%);
      border-radius: 20px 20px 80px 80px;
      padding: 25px;
      box-shadow:
        inset 2px 2px 4px rgba(255, 255, 255, 0.3),
        inset -2px -2px 4px rgba(0, 0, 0, 0.2),
        15px 15px 40px rgba(0, 0, 0, 0.5),
        -5px -5px 20px rgba(255, 255, 255, 0.1);
    }

    .gameboy::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 16px;
      background: linear-gradient(180deg, var(--gb-grey-dark), var(--gb-grey));
      border-radius: 0 0 10px 10px;
    }

    .gameboy-inner {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .nintendo-logo {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 10px;
      color: var(--gb-grey-darker);
      letter-spacing: 1px;
    }

    .gameboy-title {
      position: absolute;
      top: 18px;
      left: 15px;
      font-size: 16px;
      font-weight: bold;
      color: #4A4A4A;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.3);
    }

    .gameboy-subtitle {
      position: absolute;
      top: 34px;
      left: 15px;
      font-size: 8px;
      color: var(--gb-grey-darker);
      letter-spacing: 0.5px;
    }

    .power-led {
      position: absolute;
      top: 30px;
      right: 25px;
      width: 8px;
      height: 8px;
      background: #ff0000;
      border-radius: 50%;
      box-shadow:
        0 0 5px #ff0000,
        0 0 10px #ff0000,
        0 0 15px #ff0000;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    .power-label {
      position: absolute;
      top: 42px;
      right: 20px;
      font-size: 7px;
      color: var(--gb-grey-darker);
      letter-spacing: 1px;
    }

    .screen-container {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 190px;
      background: linear-gradient(145deg, #3D3D3D, #2A2A2A);
      border-radius: 10px 10px 20px 20px;
      padding: 15px;
      box-shadow:
        inset 3px 3px 6px rgba(0, 0, 0, 0.5),
        inset -2px -2px 4px rgba(255, 255, 255, 0.1);
    }

    .screen-label {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 7px;
      color: #555;
      letter-spacing: 2px;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: var(--gb-screen-green);
      border-radius: 5px;
      overflow: hidden;
      position: relative;
      box-shadow:
        inset 2px 2px 8px rgba(0, 0, 0, 0.8),
        inset -1px -1px 4px rgba(255, 255, 255, 0.1);
    }

    .screen::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.1) 2px,
          rgba(0, 0, 0, 0.1) 4px);
      pointer-events: none;
    }

    .screen-glow {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      background: radial-gradient(ellipse at center, rgba(139, 172, 15, var(--screen-glow-opacity, 0.15)) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
      transition: opacity 0.3s;
    }

    .screen-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-scene {
      width: 100%;
      height: 100%;
    }

    .dpad-container {
      position: absolute;
      top: 270px;
      left: 30px;
    }

    .dpad {
      position: relative;
      width: 90px;
      height: 90px;
    }

    .dpad-btn {
      position: absolute;
      background: linear-gradient(145deg, #4A4A4A, #2C2C2C);
      cursor: pointer;
      transition: all 0.1s;
      box-shadow:
        2px 2px 4px rgba(0, 0, 0, 0.4),
        inset 1px 1px 2px rgba(255, 255, 255, 0.1);
    }

    .dpad-btn:active,
    .dpad-btn.pressed {
      background: linear-gradient(145deg, #2C2C2C, #1a1a1a);
      box-shadow:
        inset 2px 2px 4px rgba(0, 0, 0, 0.6);
    }

    .dpad-up {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 32px;
      border-radius: 6px 6px 0 0;
    }

    .dpad-down {
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 32px;
      border-radius: 0 0 6px 6px;
    }

    .dpad-left {
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 28px;
      border-radius: 6px 0 0 6px;
    }

    .dpad-right {
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 28px;
      border-radius: 0 6px 6px 0;
    }

    .dpad-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 30px;
      background: radial-gradient(circle, #3A3A3A, #2C2C2C);
      border-radius: 50%;
    }

    .ab-buttons {
      position: absolute;
      top: 280px;
      right: 25px;
      transform: rotate(-25deg);
    }

    .ab-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(145deg, #8B2550, var(--gb-button-maroon-dark));
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      color: #2C2C2C;
      box-shadow:
        4px 4px 8px rgba(0, 0, 0, 0.4),
        inset 2px 2px 4px rgba(255, 255, 255, 0.2),
        inset -1px -1px 2px rgba(0, 0, 0, 0.2);
      transition: all 0.1s;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .ab-btn:active,
    .ab-btn.pressed {
      transform: scale(0.95);
      box-shadow:
        2px 2px 4px rgba(0, 0, 0, 0.4),
        inset 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .btn-a {
      position: absolute;
      top: 0;
      right: 0;
    }

    .btn-b {
      position: absolute;
      top: 35px;
      left: -5px;
    }

    .ab-label {
      position: absolute;
      font-size: 9px;
      color: var(--gb-grey-dark);
      letter-spacing: 1px;
    }

    .label-a {
      top: -5px;
      right: 50px;
    }

    .label-b {
      top: 45px;
      left: -15px;
    }

    .start-select-container {
      position: absolute;
      top: 385px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
    }

    .ss-btn {
      width: 35px;
      height: 12px;
      background: linear-gradient(180deg, #4A4A4A, #2C2C2C);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transform: rotate(-25deg);
      box-shadow:
        2px 2px 4px rgba(0, 0, 0, 0.3),
        inset 1px 1px 2px rgba(255, 255, 255, 0.1);
      transition: all 0.1s;
    }

    .ss-btn:active,
    .ss-btn.pressed {
      box-shadow:
        inset 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .ss-label {
      font-size: 8px;
      color: var(--gb-grey-dark);
      letter-spacing: 1px;
      margin-top: 5px;
      text-align: center;
    }

    .ss-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .speaker {
      position: absolute;
      bottom: 35px;
      right: 25px;
      width: 50px;
      height: 60px;
    }

    .speaker-grille {
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(-45deg,
          transparent,
          transparent 3px,
          #2C2C2C 3px,
          #2C2C2C 4px,
          transparent 4px,
          transparent 7px);
      border-radius: 5px;
    }

    .battery-compartment {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg,
          transparent,
          var(--gb-grey-dark) 10%,
          var(--gb-grey-dark) 90%,
          transparent);
      border-radius: 2px;
    }

    .controls-panel {
      position: sticky;
      top: 20px;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      color: #555;
      font-size: 0.75rem;
      letter-spacing: 2px;
    }

    /* Screen tint variations */
    .screen.tint-green {
      --tint-color: rgba(139, 172, 15, 0.3);
    }

    .screen.tint-grey {
      --tint-color: rgba(180, 180, 180, 0.3);
    }

    .screen.tint-amber {
      --tint-color: rgba(255, 183, 0, 0.3);
    }

    .screen.tint-blue {
      --tint-color: rgba(100, 149, 237, 0.3);
    }

    .screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--tint-color, transparent);
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 1;
    }

    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
        align-items: center;
      }

      .gameboy {
        transform: scale(0.85);
      }

      .controls-panel {
        position: static;
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>GameBoy Term2</h1>
    <p class="subtitle">Judgment Day Edition</p>
  </header>

  <main class="main-container">
    <div class="gameboy" id="gameboy">
      <div class="gameboy-inner">
        <span class="nintendo-logo">Nintendo</span>
        <span class="gameboy-title">GAME BOY</span>
        <span class="gameboy-subtitle">DMG-01</span>

        <div class="power-led"></div>
        <span class="power-label">POWER</span>

        <div class="screen-container">
          <span class="screen-label">DOT MATRIX WITH STEREO SOUND</span>
          <div class="screen" id="screen">
            <div class="screen-glow"></div>
            <div class="screen-content">
              <svg class="game-scene" viewBox="0 0 160 144" xmlns="http://www.w3.org/2000/svg">
                <!-- Sky gradient for Judgment Day -->
                <defs>
                  <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#1a1a2e" />
                    <stop offset="40%" style="stop-color:#4a1a3d" />
                    <stop offset="70%" style="stop-color:#8B2500" />
                    <stop offset="100%" style="stop-color:#2d1a0a" />
                  </linearGradient>
                  <linearGradient id="explosionGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" style="stop-color:#FF4500" />
                    <stop offset="50%" style="stop-color:#FFD700" />
                    <stop offset="100%" style="stop-color:#FF6347" />
                  </linearGradient>
                </defs>

                <!-- Sky background -->
                <rect width="160" height="90" fill="url(#skyGradient)" />

                <!-- City skyline silhouettes -->
                <rect x="0" y="60" width="15" height="30" fill="#0a0a12" />
                <rect x="12" y="50" width="10" height="40" fill="#0f0f1a" />
                <rect x="20" y="65" width="8" height="25" fill="#0a0a12" />
                <rect x="26" y="45" width="12" height="45" fill="#12121f" />
                <rect x="36" y="55" width="8" height="35" fill="#0a0a12" />
                <rect x="42" y="40" width="15" height="50" fill="#0f0f1a" />
                <rect x="55" y="60" width="10" height="30" fill="#0a0a12" />
                <rect x="63" y="50" width="12" height="40" fill="#12121f" />
                <rect x="73" y="65" width="8" height="25" fill="#0a0a12" />
                <rect x="79" y="55" width="10" height="35" fill="#0f0f1a" />
                <rect x="87" y="45" width="14" height="45" fill="#0a0a12" />

  <script>
    // Audio Context for button clicks
    let audioContext;
    let masterVolume = 0.7;

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    function playClickSound() {
      const ctx = initAudio();
      if (ctx.state === 'suspended') {
        ctx.resume();
      }

      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);

      oscillator.type = 'square';
      oscillator.frequency.setValueAtTime(800, ctx.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.05);

      gainNode.gain.setValueAtTime(masterVolume * 0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);

      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.08);
    }

    // Terminator 2 Theme Music (using Howler.js)
    // Note: This uses a placeholder URL. Replace with actual audio file for production.
    let themeMusic;
    let musicEnabled = true;

    function initThemeMusic() {
      // Using a placeholder - in production, replace with actual Terminator 2 theme
      themeMusic = new Howl({
        src: ['https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'],
        loop: true,
        volume: 0.5,
        html5: true,
        onload: function () {
          console.log('Theme music loaded');
          if (musicEnabled) {
            themeMusic.play();
          }
        },
        onloaderror: function (id, error) {
          console.log('Music load error (expected if no valid source):', error);
        }
      });
    }

    // GameBoy controls
    const gameboy = document.getElementById('gameboy');
    const screen = document.getElementById('screen');
    const controls = document.getElementById('controls');

    // All interactive buttons
    const buttons = document.querySelectorAll('.dpad-btn, .ab-btn, .ss-btn');

    buttons.forEach(btn => {
      btn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        playClickSound();
      });

      btn.addEventListener('mouseup', () => {
        btn.classList.remove('pressed');
      });

      btn.addEventListener('mouseleave', () => {
        btn.classList.remove('pressed');
      });

      // Touch support
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        playClickSound();
      });

      btn.addEventListener('touchend', () => {
        btn.classList.remove('pressed');
      });
    });

    // Control widget event handling
    controls.addEventListener('setting-change', (e) => {
      const { property, value } = e.detail;

      switch (property) {
        case 'contrast':
          const contrastValue = value / 100;
          screen.style.filter = `contrast(${contrastValue + 0.5})`;
          break;
        case 'tint':
          screen.className = 'screen';
          if (value !== 'green') {
            screen.classList.add(`tint-${value}`);
          }
          break;
        case 'brightness':
          const brightnessValue = value / 100;
          const glowOpacity = Math.min(0.3, brightnessValue * 0.25);
          document.querySelector('.screen-glow').style.setProperty('--screen-glow-opacity', glowOpacity);
          screen.style.filter = `brightness(${brightnessValue})`;
          break;
        case 'volume':
          masterVolume = value / 100;
          break;
        case 'music':
          musicEnabled = value;
          if (themeMusic) {
            if (musicEnabled) {
              themeMusic.play();
            } else {
              themeMusic.pause();
            }
          }
          break;
      }
    });

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      // Resume audio context on first user interaction
      document.addEventListener('click', () => {
        if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume();
        }
      }, { once: true });

      // Initialize theme music
      initThemeMusic();
    });

    // Handle visibility change to pause music when tab is hidden
    document.addEventListener('visibilitychange', () => {
      if (themeMusic) {
        if (document.hidden) {
          themeMusic.pause();
        } else if (musicEnabled) {
          themeMusic.play();
        }
      }
    });
  </script>
