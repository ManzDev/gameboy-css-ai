<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nintendo GameBoy — Terminator 2: Judgment Day</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script type="importmap">
    {
        "imports": {
            "lit": "https://cdn.jsdelivr.net/npm/lit@3.1.4/+esm",
            "lit/": "https://cdn.jsdelivr.net/npm/lit@3.1.4/+esm/"
        }
    }
    </script>
  <style>
    :root {
      --gb-body: #C4C4B4;
      --gb-body-hi: #D6D6C8;
      --gb-body-lo: #A8A898;
      --gb-bezel: #5E5E52;
      --gb-bezel-in: #4A4A3E;
      --gb-btn-dark: #2D2D2D;
      --gb-ab: #8B2252;
      --gb-ab-lo: #5A0A32;
      --accent: #D4A843;
      --bg: #0E0E12;
      --card: #17171F;
      --border: #28283A;
      --fg: #E8E4D9;
      --muted: #7A7868;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      color: var(--fg);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse at 25% 45%, rgba(155, 188, 15, .04) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 35%, rgba(212, 168, 67, .03) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(139, 34, 82, .03) 0%, transparent 40%);
    }

    .page-wrap {
      display: flex;
      align-items: center;
      gap: 44px;
      position: relative;
      z-index: 1;
      padding: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ====== GAMEBOY SHELL ====== */
    .gameboy {
      width: 340px;
      height: 574px;
      flex-shrink: 0;
      position: relative;
      user-select: none;
      background: linear-gradient(155deg, var(--gb-body-hi) 0%, var(--gb-body) 35%, var(--gb-body-lo) 100%);
      border-radius: 14px 14px 14px 76px;
      box-shadow:
        5px 7px 0 rgba(0, 0, 0, .25),
        10px 14px 28px rgba(0, 0, 0, .45),
        inset 0 1px 0 rgba(255, 255, 255, .35),
        inset 0 -1px 0 rgba(0, 0, 0, .08);
    }

    /* Subtle top highlight */
    .gameboy::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 20px;
      right: 60px;
      height: 40%;
      border-radius: 12px 12px 50% 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, .12) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Power LED */
    .pwr-led {
      position: absolute;
      top: 50px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pwr-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3a3a3a;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, .5);
      transition: all .3s;
    }

    .pwr-dot.on {
      background: #d03030;
      box-shadow: 0 0 6px #d03030, 0 0 14px rgba(208, 48, 48, .35), inset 0 1px 1px rgba(255, 255, 255, .25);
    }

    .pwr-txt {
      font-size: 4.5px;
      color: #8a8a7a;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    /* Contrast dial */
    .contrast-dial {
      position: absolute;
      top: 78px;
      left: 20px;
      width: 10px;
      height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cd-track {
      width: 3px;
      height: 42px;
      background: linear-gradient(180deg, #8a8a7a, #5a5a4e);
      border-radius: 2px;
      position: relative;
    }

    .cd-thumb {
      position: absolute;
      width: 8px;
      height: 5px;
      background: linear-gradient(180deg, #b0b0a0, #777);
      border-radius: 1px;
      top: 14px;
      left: -2.5px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .3);
    }

    /* Screen bezel */
    .screen-bezel {
      position: absolute;
      top: 38px;
      left: 32px;
      right: 32px;
      height: 216px;
      background: linear-gradient(180deg, #6a6a5e 0%, #58584c 100%);
      border-radius: 10px 10px 6px 6px;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, .35);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
    }

    .dot-matrix-label {
      font-size: 5.5px;
      color: #9a9a8a;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .screen-frame {
      width: 266px;
      height: 240px;
      background: #48483c;
      border-radius: 6px;
      padding: 13px 13px 20px 13px;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, .55);
      position: relative;
    }

    .screen-wrap {
      width: 240px;
      height: 216px;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      transition: filter .3s, border-radius .3s, box-shadow .3s;
    }

    #gameScreen {
      width: 240px;
      height: 216px;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .scanline-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .12) 2px, rgba(0, 0, 0, .12) 4px);
    }

    .scanline-overlay.on {
      opacity: 1;
    }

    .pxgrid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      background:
        repeating-linear-gradient(90deg, rgba(0, 0, 0, .08) 0 1px, transparent 1px 1.5px),
        repeating-linear-gradient(0deg, rgba(0, 0, 0, .08) 0 1px, transparent 1px 1.5px);
    }

    .pxgrid-overlay.on {
      opacity: 1;
    }

    .glow-layer {
      position: absolute;
      inset: -24px;
      border-radius: 28px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      z-index: -1;
      background: radial-gradient(ellipse, rgba(155, 188, 15, .18) 0%, transparent 65%);
    }

    .glow-layer.on {
      opacity: 1;
    }

    /* Audio prompt overlay */
    .audio-prompt {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 56, 15, .85);
      z-index: 10;
      transition: opacity .5s;
      border-radius: 2px;
    }

    .audio-prompt.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .audio-prompt span {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #9BBC0F;
      animation: pulse-text 1.5s ease-in-out infinite;
    }

    .audio-prompt .sub {
      font-size: 5px;
      color: #8BAC0F;
      margin-top: 8px;
      animation: none;
    }

    @keyframes pulse-text {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .3;
      }
    }

    /* Brand text */
    .brand {
      position: absolute;
      top: 262px;
      left: 0;
      right: 0;
      text-align: center;
    }

    .brand-nintendo {
      font-family: 'Times New Roman', serif;
      font-style: italic;
      font-weight: bold;
      font-size: 17px;
      color: #2a2a6a;
      letter-spacing: -.3px;
    }

    .brand-gb {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 19px;
      color: #2a2a6a;
      letter-spacing: 5px;
      margin-top: -1px;
    }

    /* ====== D-PAD ====== */
    .dpad-wrap {
      position: absolute;
      top: 324px;
      left: 48px;
    }

    .dpad {
      width: 82px;
      height: 82px;
      position: relative;
    }

    .dpad-bar {
      position: absolute;
      background: linear-gradient(180deg, #3c3c3c 0%, #2d2d2d 50%, #222 100%);
      box-shadow: 0 2px 0 #1a1a1a, 0 3px 5px rgba(0, 0, 0, .3), inset 0 1px 0 rgba(255, 255, 255, .08);
      transition: box-shadow .04s, transform .04s;
      cursor: pointer;
    }

    .dpad-bar.pressed {
      box-shadow: 0 0px 0 #1a1a1a, inset 0 2px 5px rgba(0, 0, 0, .45);
      transform: translateY(1px);
    }

    .dpad-v {
      width: 30px;
      height: 82px;
      top: 0;
      left: 26px;
      border-radius: 4px;
      z-index: 2;
    }

    .dpad-h {
      width: 82px;
      height: 30px;
      top: 26px;
      left: 0;
      border-radius: 4px;
      z-index: 1;
    }

    .dpad-center {
      position: absolute;
      width: 30px;
      height: 30px;
      top: 26px;
      left: 26px;
      background: #282828;
      border-radius: 3px;
      z-index: 3;
      pointer-events: none;
    }

    /* Direction arrows */
    .dpad-arrow {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      z-index: 4;
      pointer-events: none;
    }

    .dpad-arrow.up {
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      border-bottom: 5px solid #555;
    }

    .dpad-arrow.down {
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      border-top: 5px solid #555;
    }

    .dpad-arrow.left {
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      border-right: 5px solid #555;
    }

    .dpad-arrow.right {
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      border-left: 5px solid #555;
    }

    /* ====== A / B BUTTONS ====== */
    .ab-wrap {
      position: absolute;
      top: 336px;
      right: 36px;
    }

    .ab-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ab-slot {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ab-slot.b-slot {
      margin-top: 18px;
    }

    .btn-ab {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(145deg, #9e2e60, #7a1a44);
      box-shadow: 0 3px 0 #5a0a32, 0 5px 8px rgba(0, 0, 0, .3), inset 0 1px 0 rgba(255, 255, 255, .12);
      color: rgba(200, 160, 180, .6);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow .04s, transform .04s;
    }

    .btn-ab:active {
      box-shadow: 0 1px 0 #5a0a32, inset 0 2px 5px rgba(0, 0, 0, .4);
      transform: translateY(2px);
    }

    .ab-label {
      font-size: 8px;
      color: #6a6a5a;
      font-weight: 700;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* ====== START / SELECT ====== */
    .ss-wrap {
      position: absolute;
      top: 428px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .btn-ss {
      width: 44px;
      height: 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: linear-gradient(180deg, #7a7a6a, #686858);
      box-shadow: 0 2px 0 #585848, 0 3px 5px rgba(0, 0, 0, .2), inset 0 1px 0 rgba(255, 255, 255, .08);
      transform: rotate(-25deg);
      transition: box-shadow .04s, transform .04s;
    }

    .btn-ss:active {
      box-shadow: 0 0 0 #585848, inset 0 2px 4px rgba(0, 0, 0, .35);
      transform: rotate(-25deg) translateY(1px);
    }

    .ss-labels {
      display: flex;
      justify-content: space-between;
      width: 110px;
      margin-top: -2px;
    }

    .ss-labels span {
      font-size: 6px;
      color: #6a6a5a;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ====== SPEAKER ====== */
    .speaker {
      position: absolute;
      bottom: 28px;
      right: 26px;
      width: 64px;
      height: 64px;
      transform: rotate(-25deg);
    }

    .spk-line {
      position: absolute;
      height: 3px;
      width: 32px;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, #a8a898 8%, #a8a898 92%, transparent);
      box-shadow: inset 0 1px 1px rgba(0, 0, 0, .15);
    }

    /* ====== FLOATING PARTICLES ====== */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }

      8% {
        opacity: .7;
      }

      88% {
        opacity: .7;
      }

      100% {
        transform: translateY(-8vh) scale(1);
        opacity: 0;
      }
    }

    @media(prefers-reduced-motion:reduce) {
      .particle {
        display: none;
      }
    }

    /* ====== FOOTER ====== */
    .footer-note {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      opacity: .5;
      z-index: 0;
    }

    /* ====== RESPONSIVE ====== */
    @media(max-width:780px) {
      .page-wrap {
        flex-direction: column;
        gap: 20px;
      }

      .gameboy {
        transform: scale(.82);
        transform-origin: top center;
      }

      .ctrl-panel {
        width: 92vw;
        max-width: 340px;
      }
    }
  </style>
</head>

<body>

  <div id="particles"></div>

  <div class="page-wrap">
    <!-- ====== GAMEBOY ====== -->
    <div class="gameboy" id="gameboy">
      <div class="pwr-led">
        <div class="pwr-dot on" id="pwrDot"></div><span class="pwr-txt">Battery</span>
      </div>
      <div class="contrast-dial">
        <div class="cd-track">
          <div class="cd-thumb"></div>
        </div>
      </div>

      <div class="screen-bezel">
        <span class="dot-matrix-label">Dot Matrix With Stereo Sound</span>
        <div class="screen-frame">
          <div class="screen-wrap" id="screenWrap">
            <canvas id="gameScreen" width="160" height="144"></canvas>
            <div class="scanline-overlay on" id="scanOv"></div>
            <div class="pxgrid-overlay" id="pxgOv"></div>
            <div class="audio-prompt" id="audioPrompt">
              <span>PRESS START</span>
              <span class="sub">to enable audio</span>
            </div>
          </div>
          <div class="glow-layer on" id="glowOv"></div>
        </div>
      </div>

      <div class="brand">
        <div class="brand-nintendo">Nintendo</div>
        <div class="brand-gb">GAME BOY</div>
      </div>

      <!-- D-Pad -->
      <div class="dpad-wrap">
        <div class="dpad">
          <div class="dpad-bar dpad-v" id="dpadV"></div>
          <div class="dpad-bar dpad-h" id="dpadH"></div>
          <div class="dpad-center"></div>
          <div class="dpad-arrow up"></div>
          <div class="dpad-arrow down"></div>
          <div class="dpad-arrow left"></div>
          <div class="dpad-arrow right"></div>
        </div>
      </div>

      <!-- A / B -->
      <div class="ab-wrap">
        <div class="ab-row">
          <div class="ab-slot b-slot"><button class="btn-ab" id="btnB" aria-label="B Button">B</button><span
              class="ab-label">B</span></div>
          <div class="ab-slot"><button class="btn-ab" id="btnA" aria-label="A Button">A</button><span
              class="ab-label">A</span></div>
        </div>
      </div>

      <!-- Start / Select -->
      <div class="ss-wrap">
        <button class="btn-ss" id="btnSel" aria-label="Select"></button>
        <button class="btn-ss" id="btnSta" aria-label="Start"></button>
        <div class="ss-labels"><span>Select</span><span>Start</span></div>
      </div>

      <!-- Speaker -->
      <div class="speaker" id="speakerEl"></div>
    </div>

    <!-- ====== CONTROL PANEL (LitElement) ====== -->
    <gameboy-controls id="gbCtrl" class="ctrl-panel"></gameboy-controls>
  </div>

  <div class="footer-note">GameBoy Web Component &mdash; LitElement + HowlerJS</div>

  <script type="module">
    import { LitElement, html, css } from 'lit';

    /* ================================================================
       LitElement <gameboy-controls> Web Component
       ================================================================ */
    class GameBoyControls extends LitElement {
      static properties = {
        brightness: { type: Number },
        contrast: { type: Number },
        scanlines: { type: Boolean },
        pixelGrid: { type: Boolean },
        colorMode: { type: String },
        screenGlow: { type: Boolean },
        crtCurve: { type: Boolean },
        volume: { type: Number },
        _muted: { state: true }
      };

      static styles = css`
        :host { display: block; }
        .panel {
            background: var(--card, #17171F);
            border: 1px solid var(--border, #28283A);
            border-radius: 14px;
            padding: 22px 24px;
            font-family: 'Space Mono', monospace;
            color: var(--fg, #E8E4D9);
            box-shadow: 0 8px 32px rgba(0,0,0,.35);
        }
        .title {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: var(--accent, #D4A843);
            margin-bottom: 18px;
            letter-spacing: .5px;
            line-height: 1.6;
        }
        .section { margin-bottom: 18px; }
        .section:last-child { margin-bottom: 0; }
        .sec-label {
            font-size: 8px; color: var(--muted, #7A7868);
            text-transform: uppercase; letter-spacing: 2.5px;
            margin-bottom: 10px; padding-bottom: 5px;
            border-bottom: 1px solid var(--border, #28283A);
        }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .row:last-child { margin-bottom: 0; }
        .lbl { font-size: 11px; }
        .val { font-size: 9px; color: var(--accent, #D4A843); min-width: 34px; text-align: right; }

        /* Range slider */
        input[type=range] {
            -webkit-appearance: none; appearance: none;
            width: 110px; height: 4px; margin: 0 8px;
            background: var(--border, #28283A); border-radius: 2px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: var(--accent, #D4A843); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 6px rgba(212,168,67,.35);
        }
        input[type=range]::-moz-range-thumb {
            width: 14px; height: 14px; border: none;
            background: var(--accent, #D4A843); border-radius: 50%; cursor: pointer;
        }
        input[type=range]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        /* Select */
        select {
            background: var(--bg, #0E0E12); color: var(--fg, #E8E4D9);
            border: 1px solid var(--border, #28283A); border-radius: 6px;
            padding: 4px 8px; font-family: inherit; font-size: 10px;
            cursor: pointer; outline: none;
        }
        select:focus { border-color: var(--accent, #D4A843); }

        /* Toggle switch */
        .tgl-wrap { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
        .tgl-in { opacity: 0; width: 0; height: 0; position: absolute; }
        .tgl-track {
            position: absolute; inset: 0; background: var(--border, #28283A);
            border-radius: 10px; cursor: pointer; transition: background .2s;
        }
        .tgl-in:checked + .tgl-track { background: var(--accent, #D4A843); }
        .tgl-in:focus-visible + .tgl-track { outline: 2px solid var(--accent); outline-offset: 2px; }
        .tgl-dot {
            position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
            background: var(--fg, #E8E4D9); border-radius: 50%;
            transition: transform .2s; pointer-events: none;
        }
        .tgl-in:checked ~ .tgl-dot { transform: translateX(18px); }

        /* Mute button */
        .mute-btn {
            background: none; border: 1px solid var(--border, #28283A);
            color: var(--fg, #E8E4D9); width: 28px; height: 28px;
            border-radius: 6px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 11px;
            transition: all .2s;
        }
        .mute-btn:hover { border-color: var(--accent, #D4A843); color: var(--accent, #D4A843); }
        .mute-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    `;

      constructor() {
        super();
        this.brightness = 100; this.contrast = 115;
        this.scanlines = true; this.pixelGrid = false;
        this.colorMode = 'classic'; this.screenGlow = true;
        this.crtCurve = false; this.volume = 50; this._muted = true;
      }

      _emit(n, v) {
        this.dispatchEvent(new CustomEvent('gb-setting', { detail: { name: n, value: v }, bubbles: true, composed: true }));
      }

      _slider(prop, label, min, max, unit = '%') {
        return html`<div class="row">
            <span class="lbl">${label}</span>
            <input type="range" min="${min}" max="${max}" .value="${String(this[prop])}"
                @input=${e => { this[prop] = +e.target.value; this._emit(prop, this[prop]); this.requestUpdate(); }} />
            <span class="val">${this[prop]}${unit}</span>
        </div>`;
      }

      _toggle(prop, label) {
        return html`<div class="row">
            <span class="lbl">${label}</span>
            <label class="tgl-wrap">
                <input type="checkbox" class="tgl-in" .checked=${this[prop]}
                    @change=${e => { this[prop] = e.target.checked; this._emit(prop, this[prop]); this.requestUpdate(); }} />
                <div class="tgl-track"></div>
                <div class="tgl-dot"></div>
            </label>
        </div>`;
      }

      render() {
        return html`<div class="panel">
            <div class="title">DISPLAY<br>SETTINGS</div>
            <div class="section">
                <div class="sec-label">Screen</div>
                ${this._slider('brightness', 'Brightness', 40, 160)}
                ${this._slider('contrast', 'Contrast', 50, 200)}
                <div class="row">
                    <span class="lbl">Palette</span>
                    <select .value=${this.colorMode} @change=${e => { this.colorMode = e.target.value; this._emit('colorMode', this.colorMode); this.requestUpdate(); }}>
                        <option value="classic">Classic Green</option>
                        <option value="grayscale">Grayscale</option>
                        <option value="amber">Amber</option>
                        <option value="cool">Cool Blue</option>
                        <option value="inverted">Inverted</option>
                    </select>
                </div>
            </div>
            <div class="section">
                <div class="sec-label">Effects</div>
                ${this._toggle('scanlines', 'Scanlines')}
                ${this._toggle('pixelGrid', 'Pixel Grid')}
                ${this._toggle('screenGlow', 'Screen Glow')}
                ${this._toggle('crtCurve', 'CRT Curve')}
            </div>
            <div class="section">
                <div class="sec-label">Audio</div>
                <div class="row">
                    <span class="lbl">Volume</span>
                    <input type="range" min="0" max="100" .value=${String(this.volume)}
                        @input=${e => { this.volume = +e.target.value; this._muted = false; this._emit('volume', this.volume); this.requestUpdate(); }} />
                    <button class="mute-btn" @click=${() => { this._muted = !this._muted; this._emit('muted', this._muted); this.requestUpdate(); }}
                        aria-label=${this._muted ? 'Unmute' : 'Mute'}>
                        <i class="fa-solid ${this._muted ? 'fa-volume-xmark' : 'fa-volume-high'}"></i>
                    </button>
                </div>
            </div>
        </div>`;
      }
    }
    customElements.define('gameboy-controls', GameBoyControls);


    /* ================================================================
       Main Application
       ================================================================ */

    // --- Color Palettes ---
    const PALETTES = {
      classic: ['#9BBC0F', '#8BAC0F', '#306230', '#0F380F'],
      grayscale: ['#DEDEDE', '#AAAAAA', '#555555', '#111111'],
      amber: ['#FFB830', '#CC8800', '#664400', '#1C1200'],
      cool: ['#88CCFF', '#5599CC', '#224466', '#0A1828'],
      inverted: ['#0F380F', '#306230', '#8BAC0F', '#9BBC0F']
    };
    let palette = 'classic';

    // --- WAV Generator ---
    function writeStr(v, o, s) { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }

    function makeWav(sr, dur, fn) {
      const n = Math.floor(sr * dur), sz = 44 + n, buf = new ArrayBuffer(sz), v = new DataView(buf);
      writeStr(v, 0, 'RIFF'); v.setUint32(4, sz - 8, true); writeStr(v, 8, 'WAVE');
      writeStr(v, 12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
      v.setUint16(22, 1, true); v.setUint32(24, sr, true); v.setUint32(28, sr, true);
      v.setUint16(32, 1, true); v.setUint16(34, 8, true); writeStr(v, 36, 'data'); v.setUint32(40, n, true);
      for (let i = 0; i < n; i++) v.setUint8(44 + i, Math.max(0, Math.min(255, Math.floor(fn(i, n, sr) + 128))));
      const b = new Uint8Array(buf); let s = '';
      for (let i = 0; i < b.length; i += 8192) s += String.fromCharCode.apply(null, b.subarray(i, Math.min(i + 8192, b.length)));
      return 'data:audio/wav;base64,' + btoa(s);
    }

    // Chiptune BGM — dark, mechanical T2-inspired melody
    function makeBGWav() {
      const sr = 22050, bpm = 128, qn = Math.floor(sr * 60 / bpm);
      const f = { R: 0, A2: 110, E2: 82, B2: 123, C3: 131, D3: 147, E3: 165, F3: 175, G3: 196, A3: 220, B3: 247, C4: 262, D4: 294, E4: 330, F4: 349, G4: 392, A4: 440 };
      // melody [freq, quarter-notes]
      const mel = [
        [f.E4, 1], [f.E4, .5], [f.F4, .5], [f.D4, 1], [f.C4, 1], [f.C4, .5], [f.D4, .5], [f.B3, 1],
        [f.A3, 1.5], [f.R, .5], [f.E4, .5], [f.E4, .5], [f.F4, .5], [f.E4, 1], [f.D4, 1],
        [f.C4, .5], [f.D4, .5], [f.B3, 1], [f.A3, 2],
        [f.A4, 1], [f.A4, .5], [f.G4, .5], [f.F4, 1], [f.E4, 1], [f.E4, .5], [f.F4, .5], [f.D4, 1],
        [f.C4, 1.5], [f.R, .5], [f.D4, .5], [f.E4, .5], [f.D4, 1], [f.C4, 1], [f.B3, 1], [f.A3, 1]
      ];
      const bas = [
        [f.A2, 2], [f.E2, 2], [f.A2, 2], [f.E2, 2], [f.A2, 2], [f.E2, 2], [f.A2, 2], [f.E2, 2],
        [f.F3, 2], [f.C3, 2], [f.F3, 2], [f.C3, 2], [f.D3, 2], [f.A2, 2], [f.E2, 2], [f.A2, 2]
      ];
      const arp = [f.A3, f.C4, f.E4, f.C4];
      const mn = mel.map(([fr, d]) => ({ f: fr, l: Math.floor(d * qn) }));
      const bn = bas.map(([fr, d]) => ({ f: fr, l: Math.floor(d * qn) }));
      let tq = 0; for (const [, d] of mel) tq += d;
      const ts = Math.floor(tq * qn);
      // Pre-compute cumulative starts for O(1) lookup
      const melStarts = []; let acc = 0;
      for (const n of mn) { melStarts.push(acc); acc += n.l; }
      const basStarts = []; acc = 0;
      for (const n of bn) { basStarts.push(acc); acc += n.l; }

      return makeWav(sr, ts / sr, (i) => {
        let s = 0;
        // Melody — square 50% duty
        let si = 0;
        for (let j = 0; j < melStarts.length; j++) {
          const st = melStarts[j], en = st + mn[j].l;
          if (i >= st && i < en) { si = j; break; }
          if (j === melStarts.length - 1 && i >= st) { si = j; break; }
        }
        if (mn[si] && mn[si].f > 0) {
          const t = i / sr, phase = (t * mn[si].f) % 1;
          s += (phase < 0.5 ? 14 : -14);
          const li = i - melStarts[si], atk = Math.min(1, li / 180), rel = Math.min(1, (mn[si].l - li) / 400);
          s *= atk * rel;
        }
        // Bass — triangle
        si = 0;
        for (let j = 0; j < basStarts.length; j++) {
          const st = basStarts[j], en = st + bn[j].l;
          if (i >= st && i < en) { si = j; break; }
          if (j === basStarts.length - 1 && i >= st) { si = j; break; }
        }
        if (bn[si] && bn[si].f > 0) {
          const t = i / sr, phase = (t * bn[si].f) % 1;
          s += (phase < 0.5 ? 18 : -18) * (1 - Math.abs(phase - 0.5) * 2);
        }
        // Arpeggio — soft square
        const ai = Math.floor(i / (qn * 0.5)) % 4, af = arp[ai];
        const t = i / sr, ap = (t * af) % 1;
        s += (ap < 0.5 ? 5 : -5);
        // Hi-hat noise
        const hi = i % Math.floor(qn * 0.25);
        s += (hi < 60 ? (Math.random() - 0.5) * 6 : 0);
        return s;
      });
    }

    // Click sound
    function makeClickWav() {
      const sr = 22050, dur = 0.04;
      return makeWav(sr, dur, (i, n) => {
        const t = i / sr;
        return Math.sin(t * 1200 * Math.PI * 2) * 50 * Math.max(0, 1 - t / dur);
      });
    }

    // --- Howler Setup ---
    const bgmUrl = makeBGWav();
    const clickUrl = makeClickWav();
    let bgm = null;
    let clickSnd = new Howl({ src: [clickUrl], format: ['wav'], volume: 0.5 });
    let audioStarted = false;

    function startAudio(vol) {
      if (audioStarted) return;
      audioStarted = true;
      bgm = new Howl({
        src: [bgmUrl], format: ['wav'], volume: (vol || 50) / 100,
        loop: true
      });
      bgm.play();
      document.getElementById('audioPrompt').classList.add('hidden');
    }

    // --- Speaker Lines ---
    (function buildSpeaker() {
      const el = document.getElementById('speakerEl');
      for (let i = 0; i < 6; i++) {
        const line = document.createElement('div');
        line.className = 'spk-line';
        line.style.top = (8 + i * 9.5) + 'px';
        line.style.left = '16px';
        el.appendChild(line);
      }
    })();

    // --- Floating Particles ---
    (function buildParticles() {
      const cont = document.getElementById('particles');
      const colors = ['rgba(155,188,15,.25)', 'rgba(212,168,67,.18)', 'rgba(139,34,82,.15)'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const sz = 2 + Math.random() * 4;
        p.style.cssText = `
            width:${sz}px;height:${sz}px;left:${Math.random() * 100}%;
            background:${colors[i % colors.length]};
            animation-duration:${10 + Math.random() * 14}s;
            animation-delay:${Math.random() * 12}s;
        `;
        cont.appendChild(p);
      }
    })();

    // --- Canvas Scene: T2 Judgment Day ---
    const canvas = document.getElementById('gameScreen');
    const ctx = canvas.getContext('2d');
    const W = 160, H = 144;

    // Pixel art scene data
    function drawScene() {
      const p = PALETTES[palette] || PALETTES.classic;
      const [c0, c1, c2, c3] = p;

      ctx.fillStyle = c0;
      ctx.fillRect(0, 0, W, H);

      // Sky gradient (top lighter)
      for (let y = 0; y < 88; y++) {
        const t = y / 88;
        ctx.fillStyle = t < 0.4 ? c0 : (t < 0.7 ? c1 : c2);
        ctx.fillRect(0, y, W, 1);
      }

      // Distant smoke plumes (staircase pixels)
      for (let i = 0; i < 6; i++) {
        const bx = 10 + i * 26, bw = 14 + (i % 3) * 4;
        for (let sy = 72; sy > 56; sy -= 3) {
          const w = Math.floor(bw * (1 - (72 - sy) / 20));
          if (w < 2) continue;
          ctx.fillStyle = i % 2 === 0 ? c1 : c2;
          ctx.fillRect(bx + Math.floor((bw - w) / 2), sy, w, 2);
        }
      }

      // Ground
      ctx.fillStyle = c3;
      ctx.fillRect(0, 88, W, 56);

      // Road surface
      ctx.fillStyle = c2;
      ctx.fillRect(20, 92, 120, 28);

      // Road dashes
      ctx.fillStyle = c0;
      for (let dx = 28; dx < 136; dx += 14) {
        ctx.fillRect(dx, 105, 6, 2);
      }

      // Sidewalks
      ctx.fillStyle = c1;
      ctx.fillRect(18, 90, 2, 32);
      ctx.fillRect(140, 90, 2, 32);

      // --- Buildings ---
      // Building 1 (left)
      ctx.fillStyle = c3;
      ctx.fillRect(22, 52, 28, 38);
      ctx.fillStyle = c2;
      ctx.fillRect(22, 52, 28, 4);
      // Windows
      ctx.fillStyle = c0;
      for (let wy = 58; wy < 86; wy += 8) {
        for (let wx = 26; wx < 46; wx += 7) {
          ctx.fillRect(wx, wy, 4, 4);
          if (Math.random() > 0.4) { ctx.fillStyle = c1; ctx.fillRect(wx, wy, 4, 4); ctx.fillStyle = c0; }
        }
      }

      // Building 2 (center-left, damaged)
      ctx.fillStyle = c3;
      ctx.fillRect(54, 48, 24, 42);
      // Damage gap
      ctx.fillStyle = c2;
      ctx.fillRect(62, 60, 8, 12);
      ctx.fillStyle = c1;
      ctx.fillRect(64, 62, 4, 8);
      // Roof irregular
      ctx.fillStyle = c3;
      ctx.fillRect(54, 46, 16, 4);
      // Windows
      ctx.fillStyle = c0;
      for (let wy = 54; wy < 86; wy += 8) {
        ctx.fillRect(58, wy, 4, 4);
        ctx.fillRect(70, wy, 4, 4);
      }

      // Building 3 (center-right, tall)
      ctx.fillStyle = c3;
      ctx.fillRect(82, 38, 22, 52);
      ctx.fillStyle = c2;
      ctx.fillRect(82, 38, 22, 3);
      // Antenna
      ctx.fillStyle = c3;
      ctx.fillRect(91, 32, 2, 7);
      ctx.fillStyle = c1;
      ctx.fillRect(90, 31, 4, 2);
      // Windows (lit)
      ctx.fillStyle = c0;
      for (let wy = 44; wy < 86; wy += 7) {
        for (let wx = 86; wx < 100; wx += 7) {
          ctx.fillRect(wx, wy, 4, 3);
        }
      }
      // Some lit windows
      ctx.fillStyle = c1;
      ctx.fillRect(86, 51, 4, 3);
      ctx.fillRect(100, 65, 4, 3);
      ctx.fillRect(86, 79, 4, 3);

      // Building 4 (right)
      ctx.fillStyle = c3;
      ctx.fillRect(108, 56, 30, 34);
      ctx.fillStyle = c2;
      ctx.fillRect(108, 56, 30, 4);
      ctx.fillStyle = c0;
      for (let wy = 64; wy < 86; wy += 8) {
        for (let wx = 112; wx < 134; wx += 7) {
          ctx.fillRect(wx, wy, 4, 4);
        }
      }

      // --- Rubble / Debris on ground ---
      ctx.fillStyle = c2;
      ctx.fillRect(30, 88, 6, 3);
      ctx.fillRect(60, 89, 4, 2);
      ctx.fillRect(95, 88, 8, 3);
      ctx.fillRect(115, 89, 5, 2);
      ctx.fillRect(140, 88, 3, 3);

      // --- Streetlights ---
      ctx.fillStyle = c2;
      ctx.fillRect(42, 72, 2, 18);
      ctx.fillRect(38, 72, 10, 2);
      ctx.fillStyle = c1;
      ctx.fillRect(40, 73, 6, 1);

      ctx.fillStyle = c2;
      ctx.fillRect(130, 74, 2, 16);
      ctx.fillRect(126, 74, 10, 2);
      ctx.fillStyle = c1;
      ctx.fillRect(128, 75, 6, 1);

      // --- Terminators (simplified 8-bit figures) ---
      // Terminator 1 (left side, walking right)
      drawTerminator(ctx, 50, 96, c2, c3, false);
      // Terminator 2 (right side, walking left)
      drawTerminator(ctx, 110, 96, c2, c3, true);

      // --- Explosions (pixel bursts) ---
      drawExplosion(ctx, 75, 50, c1, c0);
      drawExplosion(ctx, 120, 42, c1, c0);

      // --- Title Text ---
      ctx.fillStyle = c3;
      ctx.font = '7px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('TERMINATOR 2', W / 2, 14);
      ctx.fillStyle = c2;
      ctx.font = '5px "Press Start 2P", monospace';
      ctx.fillText('JUDGMENT DAY', W / 2, 24);

      // --- Bottom UI ---
      ctx.fillStyle = c2;
      ctx.fillRect(0, 128, W, 16);
      ctx.fillStyle = c0;
      ctx.font = '5px "Press Start 2P", monospace';
      ctx.textAlign = 'left';
      ctx.fillText('LIVES: 3', 4, 138);
      ctx.textAlign = 'center';
      ctx.fillText('STAGE 1', W / 2, 138);
      ctx.textAlign = 'right';
      ctx.fillText('SCORE:0', W - 4, 138);
    }

    function drawTerminator(ctx, x, y, dark, vdark, facingLeft) {
      // Head
      ctx.fillStyle = dark;
      ctx.fillRect(x, y, 5, 5);
      // Eyes
      ctx.fillStyle = vdark;
      if (facingLeft) {
        ctx.fillRect(x, y + 1, 1, 1);
      } else {
        ctx.fillRect(x + 4, y + 1, 1, 1);
      }
      // Body
      ctx.fillStyle = dark;
      ctx.fillRect(x, y + 5, 5, 6);
      // Arms
      ctx.fillRect(x - 2, y + 6, 2, 4);
      ctx.fillRect(x + 5, y + 6, 2, 4);
      // Legs (walking stance)
      if (facingLeft) {
        ctx.fillRect(x, y + 11, 2, 4);
        ctx.fillRect(x + 3, y + 11, 2, 3);
      } else {
        ctx.fillRect(x, y + 11, 2, 3);
        ctx.fillRect(x + 3, y + 11, 2, 4);
      }
      // Gun in front hand
      ctx.fillStyle = vdark;
      if (facingLeft) {
        ctx.fillRect(x - 4, y + 7, 3, 1);
      } else {
        ctx.fillRect(x + 6, y + 7, 3, 1);
      }
    }

    function drawExplosion(ctx, x, y, light, lightest) {
      // Center
      ctx.fillStyle = lightest;
      ctx.fillRect(x - 1, y - 1, 3, 3);
      // Inner ring
      ctx.fillStyle = light;
      const ring = [
        [-3, 0], [-2, -2], [-2, 2], [0, -3], [0, 3], [2, -2], [2, 2], [3, 0]
      ];
      for (const [dx, dy] of ring) {
        ctx.fillRect(x + dx, y + dy, 1, 1);
      }
      // Outer ring (sparse)
      const outer = [[-4, 0], [-3, -3], [-3, 3], [0, -4], [0, 4], [3, -3], [3, 3], [4, 0], [-2, -4], [2, -4], [-2, 4], [2, 4]];
      for (const [dx, dy] of outer) {
        if (Math.random() > 0.35) ctx.fillRect(x + dx, y + dy, 1, 1);
      }
    }

    // Animated sparks overlay
    let sparkFrame = 0;
    const sparks = [];
    for (let i = 0; i < 12; i++) {
      sparks.push({
        x: 30 + Math.random() * 100,
        y: 40 + Math.random() * 50,
        phase: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 1.5
      });
    }

    function drawSparks() {
      const p = PALETTES[palette] || PALETTES.classic;
      sparkFrame++;
      for (const sp of sparks) {
        const on = Math.sin(sparkFrame * 0.08 * sp.speed + sp.phase) > 0.6;
        if (on) {
          ctx.fillStyle = p[0]; // lightest color
          ctx.fillRect(Math.floor(sp.x), Math.floor(sp.y), 1, 1);
          if (Math.random() > 0.5) {
            ctx.fillRect(Math.floor(sp.x) + 1, Math.floor(sp.y), 1, 1);
          }
        }
      }
    }

    // Render loop
    function render() {
      drawScene();
      drawSparks();
      requestAnimationFrame(render);
    }
    render();

    // --- Button Interactions ---
    function handleBtn(el, visualEl) {
      const trigger = (e) => {
        e.preventDefault();
        clickSnd.play();
        if (!audioStarted) startAudio(50);
        if (visualEl) visualEl.classList.add('pressed');
      };
      const release = () => {
        if (visualEl) visualEl.classList.remove('pressed');
      };
      el.addEventListener('mousedown', trigger);
      el.addEventListener('mouseup', release);
      el.addEventListener('mouseleave', release);
      el.addEventListener('touchstart', trigger, { passive: false });
      el.addEventListener('touchend', release);
    }

    handleBtn(document.getElementById('btnA'));
    handleBtn(document.getElementById('btnB'));
    handleBtn(document.getElementById('btnSel'));
    handleBtn(document.getElementById('btnSta'));

    // D-pad direction handling
    const dpadV = document.getElementById('dpadV');
    const dpadH = document.getElementById('dpadH');

    function getDpadDir(e) {
      const rect = dpadV.parentElement.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const px = e.clientX || (e.touches && e.touches[0].clientX) || cx;
      const py = e.clientY || (e.touches && e.touches[0].clientY) || cy;
      const dx = px - cx, dy = py - cy;
      return Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
    }

    function dpadDown(e) {
      e.preventDefault();
      clickSnd.play();
      if (!audioStarted) startAudio(50);
      const dir = getDpadDir(e);
      if (dir === 'up' || dir === 'down') dpadV.classList.add('pressed');
      else dpadH.classList.add('pressed');
    }
    function dpadUp() {
      dpadV.classList.remove('pressed');
      dpadH.classList.remove('pressed');
    }
    dpadV.addEventListener('mousedown', dpadDown);
    dpadH.addEventListener('mousedown', dpadDown);
    dpadV.addEventListener('touchstart', dpadDown, { passive: false });
    dpadH.addEventListener('touchstart', dpadDown, { passive: false });
    document.addEventListener('mouseup', dpadUp);
    document.addEventListener('touchend', dpadUp);

    // --- Start button: trigger audio ---
    document.getElementById('btnSta').addEventListener('click', () => {
      const vol = document.getElementById('gbCtrl').volume;
      startAudio(vol);
    });

    // --- Control Panel Event Handling ---
    const screenWrap = document.getElementById('screenWrap');
    const scanOv = document.getElementById('scanOv');
    const pxgOv = document.getElementById('pxgOv');
    const glowOv = document.getElementById('glowOv');

    document.getElementById('gbCtrl').addEventListener('gb-setting', (e) => {
      const { name, value } = e.detail;

      if (name === 'brightness' || name === 'contrast') {
        const b = document.getElementById('gbCtrl').brightness;
        const c = document.getElementById('gbCtrl').contrast;
        screenWrap.style.filter = `brightness(${b / 100}) contrast(${c / 100})`;
      }
      if (name === 'scanlines') {
        scanOv.classList.toggle('on', value);
      }
      if (name === 'pixelGrid') {
        pxgOv.classList.toggle('on', value);
      }
      if (name === 'screenGlow') {
        glowOv.classList.toggle('on', value);
      }
      if (name === 'crtCurve') {
        screenWrap.style.borderRadius = value ? '16px' : '2px';
        screenWrap.style.boxShadow = value
          ? 'inset 0 0 40px rgba(0,0,0,.35), inset 0 0 8px rgba(0,0,0,.2)'
          : 'none';
      }
      if (name === 'colorMode') {
        palette = value;
      }
      if (name === 'volume') {
        if (bgm) bgm.volume(value / 100);
        clickSnd.volume(value / 200);
      }
      if (name === 'muted') {
        if (bgm) bgm.mute(value);
        clickSnd.mute(value);
      }
    });

    // Initial filter
    screenWrap.style.filter = 'brightness(1) contrast(1.15)';
  </script>
</body>
