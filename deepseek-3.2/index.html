<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GameBoy Classic - Terminator 2 Edition</title>
  <!-- LitElement + LitHTML CDN -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/lit-element@3.3.2/lit-element.js?module"></script>
  <!-- HowlerJS for advanced audio -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <style>
    * {
      user-select: none;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #2b2e3a 0%, #1a1c24 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'VT323', monospace;
      margin: 0;
      padding: 20px;
    }

    /* main container: gameboy + side panel */
    .dashboard {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 30px;
      backdrop-filter: blur(2px);
    }

    /* ----- GAMEBOY SHELL (original grey) ----- */
    .gameboy {
      position: relative;
      width: 520px;
      height: 820px;
      background: #c0c8d0;
      /* classic grey base */
      border-radius: 60px 60px 80px 80px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 4px rgba(255, 255, 255, 0.6);
      border-bottom: 8px solid #8a929a;
      transition: all 0.1s ease;
    }

    /* textured grain effect */
    .gameboy::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 20% 30%, rgba(0, 0, 0, 0.05) 1.5px, transparent 1.5px);
      background-size: 12px 12px;
      pointer-events: none;
      border-radius: inherit;
    }

    /* screen bezel area */
    .screen-bezel {
      background: #5e6670;
      margin: 50px 30px 20px 30px;
      padding: 20px 15px 15px 15px;
      border-radius: 32px;
      box-shadow: inset 0 0 0 2px #3a3f47, 0 8px 12px rgba(0, 0, 0, 0.2);
    }

    /* actual LCD screen + canvas */
    .lcd {
      background: #7b8a4b;
      padding: 12px;
      border-radius: 12px;
      box-shadow: inset 0 0 0 3px #2d3420, 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background-color: #8bac0f;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      image-rendering: pixelated;
      border-radius: 4px;
      box-shadow: inset 0 0 0 2px #3f5020;
    }

    #gameCanvas {
      width: 400px;
      height: 320px;
      background: #9bbc0f;
    }

    /* labels & branding */
    .brand {
      text-align: center;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      letter-spacing: 4px;
      color: #5e3524;
      text-shadow: 1px 1px 0 #e0e6ed;
      margin-top: 12px;
      font-size: 18px;
    }

    /* D-Pad container */
    .controls {
      display: flex;
      justify-content: space-between;
      padding: 25px 35px 40px 35px;
    }

    .dpad {
      position: relative;
      width: 130px;
      height: 130px;
    }

    .dpad-button {
      position: absolute;
      background: #2a2e35;
      width: 40px;
      height: 40px;
      box-shadow: 0 3px 0 #111;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.02s linear;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: #8c959e;
      text-shadow: 0 1px 0 black;
    }

    .dpad-button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #111;
    }

    .up {
      top: 0;
      left: 45px;
    }

    .down {
      bottom: 0;
      left: 45px;
    }

    .left {
      top: 45px;
      left: 0;
    }

    .right {
      top: 45px;
      right: 0;
    }

    /* action buttons */
    .action-buttons {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .game-btn {
      background: #5f2c3a;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      box-shadow: 0 5px 0 #30131c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-weight: bold;
      font-size: 20px;
      color: #f3c2c2;
      transition: 0.02s linear;
    }

    .game-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #30131c;
    }

    .btn-a {
      background: #ac3a5e;
    }

    .btn-b {
      background: #6b3c4c;
    }

    /* select/start */
    .select-start {
      display: flex;
      gap: 35px;
      margin-top: 15px;
      justify-content: center;
    }

    .pill-btn {
      background: #4d535c;
      width: 55px;
      height: 18px;
      border-radius: 20px;
      box-shadow: 0 2px 0 #222;
      cursor: pointer;
      font-size: 9px;
      text-align: center;
      line-height: 18px;
      font-weight: bold;
      color: #cfd6df;
    }

    .pill-btn:active {
      transform: translateY(2px);
    }

    /* side panel custom element container */
    .settings-panel {
      background: #1e2129cc;
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 15px;
      border: 1px solid #8f9bb3;
      box-shadow: 0 12px 28px black;
      width: 260px;
    }

    /* responsive */
    @media (max-width: 860px) {
      .gameboy {
        transform: scale(0.85);
        margin: -30px;
      }

      .settings-panel {
        width: 240px;
      }
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <div class="gameboy">
      <div class="screen-bezel">
        <div class="lcd">
          <canvas id="gameCanvas" width="400" height="320"></canvas>
        </div>
        <div class="brand">Nintendo GAME BOY™</div>
      </div>

      <div class="controls">
        <div class="dpad">
          <div class="dpad-button up" data-dir="up">▲</div>
          <div class="dpad-button down" data-dir="down">▼</div>
          <div class="dpad-button left" data-dir="left">◀</div>
          <div class="dpad-button right" data-dir="right">▶</div>
        </div>
        <div class="action-buttons">
          <div class="game-btn btn-b" data-btn="B">B</div>
          <div class="game-btn btn-a" data-btn="A">A</div>
        </div>
      </div>
      <div class="select-start">
        <div class="pill-btn" data-btn="SELECT">SELECT</div>
        <div class="pill-btn" data-btn="START">START</div>
      </div>
    </div>

    <!-- LIT-ELEMENT based visual settings widget -->
    <gameboy-settings></gameboy-settings>
  </div>

  <script type="module">
    import { LitElement, html, css } from 'https://cdn.jsdelivr.net/npm/lit-element@3.3.2/lit-element.js';

    // ---------- STATIC TERMINATOR 2 SCENE (pixel-art style) ----------
    function drawTerminatorScene(ctx, width, height, styleVars = {}) {
      // styleVars: { brightness, contrast, scanlines, tint }
      const brightness = styleVars.brightness ?? 1.0;
      const contrast = styleVars.contrast ?? 1.0;
      const tint = styleVars.tint ?? '#9bbc0f'; // classic greenish default

      // clear and draw authentic looking T2: Judgment Day (GameBoy) scene
      // Background: dark future / city ruins
      ctx.fillStyle = tint;
      ctx.fillRect(0, 0, width, height);

      // ground / road
      ctx.fillStyle = '#306030';
      ctx.fillRect(0, height - 80, width, 80);
      ctx.fillStyle = '#487a3a';
      for (let i = 0; i < 12; i++) {
        ctx.fillRect(30 + i * 35, height - 70, 18, 8);
      }

      // Terminator T-800 silhouette (classic pixel style)
      ctx.fillStyle = '#1a2a1a';
      // head
      ctx.fillRect(180, 140, 40, 35);
      ctx.fillRect(190, 125, 20, 20);
      // torso
      ctx.fillRect(175, 175, 50, 55);
      // arms
      ctx.fillRect(160, 180, 20, 35);
      ctx.fillRect(220, 180, 20, 35);
      // legs
      ctx.fillRect(185, 230, 15, 40);
      ctx.fillRect(200, 230, 15, 40);
      // red eye (classic terminator)
      ctx.fillStyle = '#d04020';
      ctx.fillRect(196, 133, 8, 6);
      ctx.fillStyle = '#ff7040';
      ctx.fillRect(197, 134, 4, 4);

      // Plasma rifle effect
      ctx.fillStyle = '#c0ff70';
      ctx.fillRect(240, 185, 35, 8);
      ctx.fillStyle = '#f0e060';
      ctx.fillRect(270, 183, 12, 12);

      // "JUDGMENT DAY" text pixel style
      ctx.font = "bold 12px 'Courier New', monospace";
      ctx.fillStyle = '#b0d050';
      ctx.fillText("T2: JUDGMENT DAY", 130, 290);
      ctx.font = "8px monospace";
      ctx.fillStyle = '#88aa40';
      ctx.fillText("2029 - FUTURE WAR", 140, 308);

      // small explosion pixel particles
      for (let i = 0; i < 18; i++) {
        ctx.fillStyle = `rgba(220, 140, 30, ${0.6 + Math.random() * 0.4})`;
        ctx.fillRect(260 + i % 5 * 4, 140 + Math.floor(i / 3) * 3, 2, 2);
      }

      // Apply post-processing effects (brightness/contrast simulation via composite)
      // Actually apply image data filter for better retro feel
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i + 1];
        let b = data[i + 2];
        // apply contrast and brightness
        let factor = contrast;
        let brightShift = (brightness - 1) * 50;
        r = (r - 128) * factor + 128 + brightShift;
        g = (g - 128) * factor + 128 + brightShift;
        b = (b - 128) * factor + 128 + brightShift;
        data[i] = Math.min(255, Math.max(0, r));
        data[i + 1] = Math.min(255, Math.max(0, g));
        data[i + 2] = Math.min(255, Math.max(0, b));
      }
      ctx.putImageData(imageData, 0, 0);

      // scanlines overlay if requested
      if (styleVars.scanlines) {
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        for (let y = 0; y < height; y += 2) {
          ctx.fillRect(0, y, width, 1);
        }
      }

      // extra pixel dust
      ctx.fillStyle = '#302818';
      for (let i = 0; i < 60; i++) {
        ctx.fillRect(20 + Math.random() * 360, 20 + Math.random() * 280, 1, 1);
      }
    }

    // Audio manager using Howler
    const themeSound = new Howl({
      src: ['https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c9f3f6b3.mp3?filename=retro-game-8-bit-142362.mp3'],
      loop: true,
      volume: 0.5,
      html5: true
    });
    // fallback if that url fails, but we provide a backup short beep? Instead we have click sound.
    const clickSound = new Howl({
      src: ['https://www.soundjay.com/misc/sounds/button-click-2-101831.mp3'],
      volume: 0.3,
      html5: true
    });

    // fallback for click if primary fails, we'll also generate a simple web audio "tick"
    function playClick() {
      clickSound.play().catch(e => {
        // fallback: create simple beep using web audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.1;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
        osc.stop(audioCtx.currentTime + 0.1);
        audioCtx.resume();
      });
    }

    // LIT-ELEMENT: Settings controller
    class GameboySettings extends LitElement {
      static styles = css`
      :host {
        display: block;
        background: #0f1119cc;
        backdrop-filter: blur(12px);
        border-radius: 28px;
        padding: 18px 14px;
        font-family: 'Courier New', monospace;
        color: #eef5ff;
        border: 1px solid #5b6e8c;
        box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        width: 260px;
      }
      h3 {
        margin: 0 0 12px 0;
        font-size: 1.2rem;
        text-align: center;
        letter-spacing: 2px;
        border-bottom: 1px solid #5f7f9e;
        display: inline-block;
        width: 100%;
      }
      .control-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 6px;
        font-weight: bold;
      }
      input {
        width: 100%;
        cursor: pointer;
        background: #2e3545;
        border: none;
        height: 4px;
        border-radius: 5px;
      }
      .value-display {
        font-size: 0.7rem;
        text-align: right;
        opacity: 0.8;
      }
      .toggle-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 12px 0;
      }
      button {
        background: #3a4a62;
        border: none;
        color: white;
        padding: 5px 12px;
        border-radius: 40px;
        font-family: monospace;
        cursor: pointer;
      }
      button:active {
        background: #1f2a3a;
      }
    `;

      static properties = {
        brightness: { type: Number },
        contrast: { type: Number },
        scanlines: { type: Boolean },
        volume: { type: Number }
      };

      constructor() {
        super();
        this.brightness = 1.0;
        this.contrast = 1.0;
        this.scanlines = true;
        this.volume = 0.5;
      }

      firstUpdated() {
        this.dispatchEvent(new CustomEvent('settings-update', {
          detail: this.getSettings(),
          bubbles: true,
          composed: true
        }));
        // sync music volume
        themeSound.volume(this.volume);
      }

      getSettings() {
        return {
          brightness: this.brightness,
          contrast: this.contrast,
          scanlines: this.scanlines,
          volume: this.volume
        };
      }

      updated(changedProps) {
        if (changedProps.has('brightness') || changedProps.has('contrast') || changedProps.has('scanlines') || changedProps.has('volume')) {
          this.dispatchEvent(new CustomEvent('settings-update', {
            detail: this.getSettings(),
            bubbles: true,
            composed: true
          }));
          themeSound.volume(this.volume);
        }
      }

      render() {
        return html`
        <h3>🎛️ VISUAL SETTINGS</h3>
        <div class="control-group">
          <label>🔆 BRIGHTNESS ${this.brightness.toFixed(2)}</label>
          <input type="range" min="0.5" max="1.6" step="0.01" .value="${this.brightness}" @input="${e => this.brightness = parseFloat(e.target.value)}">
        </div>
        <div class="control-group">
          <label>🎚️ CONTRAST ${this.contrast.toFixed(2)}</label>
          <input type="range" min="0.6" max="1.8" step="0.01" .value="${this.contrast}" @input="${e => this.contrast = parseFloat(e.target.value)}">
        </div>
        <div class="toggle-group">
          <span>📺 SCANLINES</span>
          <button @click="${() => this.scanlines = !this.scanlines}">${this.scanlines ? 'ON' : 'OFF'}</button>
        </div>
        <div class="control-group">
          <label>🔊 MUSIC VOLUME ${Math.round(this.volume * 100)}%</label>
          <input type="range" min="0" max="1" step="0.02" .value="${this.volume}" @input="${e => this.volume = parseFloat(e.target.value)}">
        </div>
        <div style="font-size:10px; text-align:center; margin-top:10px;">T2: Judgment Day scene</div>
      `;
      }
    }

    customElements.define('gameboy-settings', GameboySettings);

    // ---- GAMEBOY MAIN RENDERING + INTERACTIONS ----
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let currentSettings = {
      brightness: 1.0,
      contrast: 1.0,
      scanlines: true,
      tint: '#9bbc0f'   // classic green hue
    };

    function renderScreen() {
      if (!ctx) return;
      drawTerminatorScene(ctx, 400, 320, {
        brightness: currentSettings.brightness,
        contrast: currentSettings.contrast,
        scanlines: currentSettings.scanlines,
        tint: currentSettings.tint
      });
    }

    // listen for settings changes from webcomponent
    window.addEventListener('settings-update', (e) => {
      currentSettings = { ...currentSettings, ...e.detail };
      renderScreen();
    });

    // interactive button clicks + d-pad with click sounds
    const allInteractive = document.querySelectorAll('.dpad-button, .game-btn, .pill-btn');
    function handlePress(buttonId) {
      playClick();
      // optional subtle visual flash on canvas:
      canvas.style.filter = 'brightness(1.2) contrast(1.1)';
      setTimeout(() => { canvas.style.filter = ''; }, 80);
      console.log(`Pressed: ${buttonId}`);
      // we could add small animation on screen text but it's cool.
      // extra: simulate button label on canvas
      ctx.save();
      ctx.font = "bold 12px monospace";
      ctx.fillStyle = "#fff6cf";
      ctx.shadowBlur = 0;
      ctx.fillText(`> ${buttonId}`, 20, 40);
      setTimeout(() => renderScreen(), 150);
    }

    allInteractive.forEach(el => {
      const btnName = el.getAttribute('data-btn') || el.getAttribute('data-dir') || el.innerText.trim();
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        handlePress(btnName);
      });
      // touch/mobile response
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handlePress(btnName);
      });
    });

    // auto-play theme music with user interaction requirement (some browsers block autoplay)
    // but we'll try to autoplay on page load using Howler's autoplay but safer: start on any first user interaction.
    let musicStarted = false;
    function startMusic() {
      if (!musicStarted) {
        themeSound.play();
        musicStarted = true;
      }
    }
    // try to autoplay on load? Browsers restrict but we attach to body click/tap.
    document.body.addEventListener('click', startMusic, { once: true });
    document.body.addEventListener('touchstart', startMusic, { once: true });
    // also try window load but we use user first gesture for best compatibility.
    // However we also try to autoplay with Howler mute/unmute trick? We'll do graceful.
    // additionally call start music after 0.5 sec if no interaction? to be user-friendly,
    // but we show note: "click/tap to start music"
    setTimeout(() => {
      if (!musicStarted) {
        // show console info
        console.log("Tap anywhere to activate 8-bit Terminator theme!");
      }
    }, 500);

    // draw initial scene
    renderScreen();

    // add extra visual retro flicker? optional
    // also we can store tint from potential color modifications but we keep classic.

    // dpad also supports arrow keys for extra fun (optional)
    window.addEventListener('keydown', (e) => {
      const key = e.key;
      let btn = null;
      if (key === 'ArrowUp') btn = 'UP';
      else if (key === 'ArrowDown') btn = 'DOWN';
      else if (key === 'ArrowLeft') btn = 'LEFT';
      else if (key === 'ArrowRight') btn = 'RIGHT';
      else if (key === 'a' || key === 'A') btn = 'A';
      else if (key === 'b' || key === 'B') btn = 'B';
      else if (key === 'Enter') btn = 'START';
      else if (key === 'Shift') btn = 'SELECT';
      if (btn) {
        e.preventDefault();
        playClick();
        handlePress(btn);
      }
    });

    // small style for canvas click flash
    // also ensure music start if any button pressed
    const anyButtonPress = () => startMusic();
    document.querySelectorAll('.dpad-button, .game-btn, .pill-btn').forEach(btn => {
      btn.addEventListener('click', anyButtonPress);
      btn.addEventListener('touchstart', anyButtonPress);
    });

    // final: ensure that game canvas gets continuous settings update on resize?
    window.addEventListener('load', () => {
      renderScreen();
    });

    // info:  T2 static scene re-rendered every time settings change, plus button feedback.
    // Also ensure Howler fallback and UI remains fully functional.
  </script>
</body>

</html>
