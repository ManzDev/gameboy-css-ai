<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro GameBoy - T2 Edition</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
  <script type="module">
    import { LitElement, html, css } from 'https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js';

    // --- Settings Component ---
    class GameboySettings extends LitElement {
      static styles = css`
                :host {
                    display: block;
                    padding: 15px;
                    background: #333;
                    color: white;
                    border-radius: 8px;
                    font-family: sans-serif;
                    width: 200px;
                }
                label { display: block; margin-bottom: 10px; font-size: 12px; }
                input { width: 100%; }
            `;

      updateSetting(e, type) {
        const event = new CustomEvent('setting-changed', {
          detail: { type, value: e.target.value },
          bubbles: true,
          composed: true
        });
        this.dispatchEvent(event);
      }

      render() {
        return html`
                    <h3>Settings</h3>
                    <label>
                        Screen Brightness
                        <input type="range" min="0.5" max="1.5" step="0.1" value="1"
                               @input=${(e) => this.updateSetting(e, 'brightness')}>
                    </label>
                    <label>
                        Body Color Hue
                        <input type="range" min="0" max="360" value="0"
                               @input=${(e) => this.updateSetting(e, 'hue')}>
                    </label>
                `;
      }
    }
    customElements.define('gb-settings', GameboySettings);
  </script>

  <style>
    :root {
      --gb-body: #b3b3b3;
      --gb-screen-bezel: #777b7e;
      --gb-screen-bg: #8bac0f;
      --gb-accent: #9b1a3d;
      --brightness: 1;
      --hue: 0deg;
    }

    body {
      background-color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      gap: 40px;
    }

    /* --- GameBoy Hardware --- */
    .gameboy {
      width: 320px;
      height: 520px;
      background-color: var(--gb-body);
      border-radius: 10px 10px 60px 10px;
      box-shadow: inset -10px -10px 0px rgba(0, 0, 0, 0.1), 10px 10px 20px rgba(0, 0, 0, 0.5);
      padding: 40px 25px;
      position: relative;
      filter: hue-rotate(var(--hue));
      user-select: none;
    }

    /* Screen Area */
    .screen-bezel {
      background-color: var(--gb-screen-bezel);
      width: 100%;
      height: 240px;
      border-radius: 10px 10px 40px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
    }

    .screen {
      width: 200px;
      height: 180px;
      background-color: var(--gb-screen-bg);
      border: 4px solid #333;
      filter: brightness(var(--brightness));
      position: relative;
      overflow: hidden;
    }

    /* T2 Static Image Simulation */
    .t2-scene {
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(139, 172, 15, 0.7), rgba(139, 172, 15, 0.7)),
        url('https://api.screenshotmachine.com/?key=123456&url=https://m.media-amazon.com/images/M/MV5BMjA5NTY2OTYxNl5BMl5BanBnXkFtZTgwNjA2MTM0MDE@._V1_.jpg&dimension=1024x768');
      background-size: cover;
      image-rendering: pixelated;
    }

    /* Controls */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 180px;
    }

    .d-pad {
      position: relative;
      width: 100px;
      height: 100px;
    }

    .dp-btn {
      position: absolute;
      background: #333;
      width: 30px;
      height: 30px;
      cursor: pointer;
      box-shadow: 0 4px 0 #000;
    }

    .dp-btn:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    .up {
      top: 0;
      left: 35px;
    }

    .down {
      bottom: 0;
      left: 35px;
    }

    .left {
      top: 35px;
      left: 0;
    }

    .right {
      top: 35px;
      right: 5px;
    }

    .buttons-ab {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      gap: 15px;
      transform: rotate(-25deg);
    }

    .btn {
      width: 45px;
      height: 45px;
      background: var(--gb-accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 4px 0 #601026;
      display: flex;
      justify-content: center;
      align-items: center;
      color: rgba(0, 0, 0, 0.2);
      font-weight: bold;
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    .start-select {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .pill {
      width: 50px;
      height: 12px;
      background: #999;
      border-radius: 10px;
      transform: rotate(-25deg);
      cursor: pointer;
      box-shadow: 0 2px 0 #666;
    }
  </style>
</head>

<body>

  <div class="gameboy" id="gb">
    <div class="screen-bezel">
      <div class="screen">
        <div class="t2-scene"></div>
      </div>
    </div>

    <div class="controls">
      <div class="d-pad">
        <div class="dp-btn up" onclick="playClick()"></div>
        <div class="dp-btn down" onclick="playClick()"></div>
        <div class="dp-btn left" onclick="playClick()"></div>
        <div class="dp-btn right" onclick="playClick()"></div>
      </div>

      <div class="buttons-ab">
        <div class="btn" onclick="playClick()">B</div>
        <div class="btn" onclick="playClick()">A</div>
      </div>
    </div>

    <div class="start-select">
      <div class="pill" onclick="playClick()"></div>
      <div class="pill" onclick="playClick()"></div>
    </div>
  </div>

  <gb-settings id="settings"></gb-settings>

  <script>
    // --- Audio Logic ---
    // Note: Browsers block auto-play until the user interacts.
    // We'll play on the first click.
    const theme = new Howl({
      src: ['https://www.zapsplat.com/wp-content/uploads/2015/sound-effects-84577/zapsplat_multimedia_game_retro_musical_element_classic_short_001_86532.mp3'],
      loop: true,
      volume: 0.5
    });

    const clickSfx = new Howl({
      src: ['https://www.zapsplat.com/wp-content/uploads/2015/sound-effects-one/foley_mechanical_typewriter_key_press_001.mp3'],
      volume: 0.8
    });

    function playClick() {
      clickSfx.play();
      if (!theme.playing()) theme.play();
    }

    // --- Reactive Settings ---
    const gb = document.getElementById('gb');
    document.getElementById('settings').addEventListener('setting-changed', (e) => {
      const { type, value } = e.detail;
      if (type === 'brightness') {
        gb.style.setProperty('--brightness', value);
      } else if (type === 'hue') {
        gb.style.setProperty('--hue', `${value}deg`);
      }
    });
  </script>
</body>

</html>
