<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>GameBoy T-800 Edition</title>

  <!-- HowlerJS -->
  <script src="https://unpkg.com/howler@2.2.4/dist/howler.min.js"></script>

  <!-- Lit -->
  <script type="module" src="https://unpkg.com/lit@3.1.2/index.js?module"></script>

  <style>
    :root {
      --gb-body: #cfcfc7;
      --gb-dark: #9b9b94;
      --gb-screen: #9bbc0f;
      --gb-screen-dark: #0f380f;
      --scale: 1;
      --brightness: 1;
    }

    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: monospace;
      display: flex;
      gap: 40px;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .gameboy {
      transform: scale(var(--scale));
      filter: brightness(var(--brightness));
      width: 320px;
      height: 540px;
      background: var(--gb-body);
      border-radius: 20px 20px 60px 20px;
      padding: 20px;
      box-shadow: inset -6px -6px 0 var(--gb-dark);
      position: relative;
    }

    .screen-frame {
      background: #555;
      padding: 15px;
      border-radius: 10px;
    }

    .screen {
      width: 100%;
      height: 180px;
      background: var(--gb-screen);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 20px var(--gb-screen-dark);
    }

    .screen img {
      width: 100%;
      image-rendering: pixelated;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
    }

    .dpad {
      width: 100px;
      height: 100px;
      position: relative;
    }

    .dpad button {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #333;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .up {
      top: 0;
      left: 35px;
    }

    .down {
      bottom: 0;
      left: 35px;
    }

    .left {
      left: 0;
      top: 35px;
    }

    .right {
      right: 0;
      top: 35px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      transform: rotate(-20deg);
    }

    .buttons button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #7a1f3d;
      border: none;
      cursor: pointer;
    }

    .start-select {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
    }

    .start-select button {
      width: 50px;
      height: 10px;
      background: #444;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="gameboy">
    <div class="screen-frame">
      <div class="screen">
        <!-- Reemplaza con sprite real -->
        <img src="t2-screen.png" alt="T2 GameBoy Scene">
      </div>
    </div>

    <div class="controls">
      <div class="dpad">
        <button class="up"></button>
        <button class="down"></button>
        <button class="left"></button>
        <button class="right"></button>
      </div>

      <div class="buttons">
        <button>A</button>
        <button>B</button>
      </div>
    </div>

    <div class="start-select">
      <button></button>
      <button></button>
    </div>
  </div>

  <visual-controls></visual-controls>

  <script type="module">
    import { LitElement, html, css } from 'lit';

    class VisualControls extends LitElement {
      static styles = css`
        :host {
          display: block;
          background: #222;
          padding: 20px;
          border-radius: 10px;
        }
        label {
          display: block;
          margin-bottom: 10px;
        }
      `;

      render() {
        return html`
          <label>
            Scale
            <input type="range" min="0.8" max="1.5" step="0.1"
              @input=${e => document.documentElement.style.setProperty('--scale', e.target.value)}>
          </label>

          <label>
            Brightness
            <input type="range" min="0.6" max="1.4" step="0.1"
              @input=${e => document.documentElement.style.setProperty('--brightness', e.target.value)}>
          </label>
        `;
      }
    }

    customElements.define('visual-controls', VisualControls);

    // AUDIO (humano, pon los archivos reales)
    const music = new Howl({
      src: ['t2-theme.mp3'],
      loop: true,
      volume: 0.5
    });

    const click = new Howl({
      src: ['click.wav'],
      volume: 0.7
    });

    window.addEventListener('load', () => {
      music.play();
    });

    document.querySelectorAll('button').forEach(btn =>
      btn.addEventListener('click', () => click.play())
    );
  </script>

</body>

</html>
